<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bimgo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Poppins:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #B9A6E0;
    --circle-color: #9F87CC;
    --text-dark: #1E2A3A;
    --text-gray: #8A93A0;
    --card-bg: #FFFFFF;
    /* اسم "Bimgo" بخط Lato */
    --font-name: 'Lato', sans-serif;
    /* باقي النصوص بخط GT Walsheim Pro (لو متثبت عندك الفونت هيظهر تلقائي،
       ولو مش متثبت هيظهر بديل قريب منه Poppins لحد ما تضيفي ملف الفونت الأصلي) */
    --font-body: 'GT Walsheim Pro', 'Poppins', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--card-bg);
    display: flex;
    justify-content: center;
  }

  /* ===================== شاشة الترحيب ===================== */
  #welcome {
    position: fixed;
    inset: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.6s ease;
  }

  #welcome img {
    width: 70%;
    max-width: 320px;
    animation: welcomePop 0.8s ease;
  }

  @keyframes welcomePop {
    0%   { opacity: 0; transform: scale(0.7); }
    60%  { opacity: 1; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  #welcome.hide {
    opacity: 0;
    pointer-events: none;
  }

  /* ===================== الصفحة الرئيسية ===================== */
  .page {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
  }

  .header {
    background: var(--bg-color);
    height: 150px;
    border-radius: 0 0 50% 50% / 0 0 40px 40px;
  }

  .avatar-wrap {
    width: 205px;
    height: 205px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: -100px auto 0;
    position: relative;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }

  .avatar {
    width: 175px;
    height: 175px;
    background-image: url('logo.png');
    background-size: cover;
    background-position: center;
    border-radius: 50%;
  }

  .info {
    text-align: center;
    padding: 20px 24px 24px;
  }

  .name {
    font-family: var(--font-name);
    font-size: 30px;
    font-weight: 400;
    color: var(--text-dark);
    margin-bottom: 8px;
  }

  .tagline {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 17px;
    color: var(--text-gray);
    margin-bottom: 20px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: #eee;
    margin: 0 auto 30px;
  }

  .section-title {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 22px;
    color: var(--text-dark);
    padding: 0 24px;
    margin-bottom: 12px;
  }

  .links {
    padding: 0 24px 40px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 16px;
    padding: 14px 16px;
    text-decoration: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }

  .link-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
    flex-shrink: 0;
  }

  .icon.facebook { background: #3b5998; }
  .icon.instagram { background: radial-gradient(circle at 30% 110%, #fdf497, #fd5949, #d6249f, #285AEB); }
  .icon.tiktok { background: #000; }

  .link-text .title { font-family: var(--font-body); font-size: 17px; color: var(--text-dark); font-weight: 400; }
  .link-text .subtitle { font-family: var(--font-body); font-size: 13px; color: var(--text-gray); font-weight: 400; }

  .arrow { color: #aaa; font-size: 18px; }
</style>
</head>
<body>

<!-- ✏️ شاشة الترحيب: بتظهر أول ما حد يفتح الصفحة وبعدين تختفي لوحدها -->
<div id="welcome">
  <img src="welcome-logo.png" alt="Bimgo">
</div>

<div class="page">

  <div class="header"></div>

  <div class="avatar-wrap">
    <div class="avatar"></div>
  </div>

  <div class="info">
    <div class="name">Bimgo</div>
    <div class="tagline">coloring book</div>
    <div class="divider"></div>
  </div>

  <div class="section-title">Find me on</div>

  <div class="links">

    <a class="link-card" href="https://www.facebook.com/share/1U6dfmK5mq/?mibextid=wwXIfr" target="_blank">
      <div class="link-left">
        <div class="icon facebook">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="#fff"><path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.494v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.464.099 2.795.143v3.24h-1.918c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.294h6.116c.732 0 1.325-.593 1.325-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"/></svg>
        </div>
        <div class="link-text">
          <div class="title">Facebook</div>
          <div class="subtitle">Bimgo</div>
        </div>
      </div>
      <div class="arrow">&#8594;</div>
    </a>

    <a class="link-card" href="https://www.instagram.com/bimggoo?igsh=MXdjYWM3enBldjZ2NQ==" target="_blank">
      <div class="link-left">
        <div class="icon instagram">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="#fff" stroke="none"/></svg>
        </div>
        <div class="link-text">
          <div class="title">Instagram</div>
          <div class="subtitle">bimggoo</div>
        </div>
      </div>
      <div class="arrow">&#8594;</div>
    </a>

    <a class="link-card" href="https://www.tiktok.com/@tiiilla1?_r=1&_t=ZS-97mV9HFkgsu" target="_blank">
      <div class="link-left">
        <div class="icon tiktok">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M16.6 5.82c-1.02-.88-1.66-2.14-1.66-3.55h-3.2v14.4c0 1.6-1.3 2.9-2.9 2.9s-2.9-1.3-2.9-2.9 1.3-2.9 2.9-2.9c.28 0 .55.04.8.11v-3.24a6.1 6.1 0 0 0-.8-.05C5.66 10.59 3 13.25 3 16.53s2.66 5.94 5.94 5.94 5.94-2.66 5.94-5.94V9.4a8.16 8.16 0 0 0 4.72 1.5V7.7a4.85 4.85 0 0 1-3-1.88z"/></svg>
        </div>
        <div class="link-text">
          <div class="title">TikTok</div>
          <div class="subtitle">tiiilla1</div>
        </div>
      </div>
      <div class="arrow">&#8594;</div>
    </a>

  </div>

</div>

<script>
  // شاشة الترحيب بتفضل ثانية ونص وبعدين تختفي بهدوء
  setTimeout(function () {
    document.getElementById('welcome').classList.add('hide');
  }, 1500);
</script>

</body>
</html>

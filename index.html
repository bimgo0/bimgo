<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحتي</title>
<style>
  :root {
    /* ============================================= */
    /* 🎨 غيّري الألوان من هنا فقط                    */
    /* ============================================= */
    --bg-color: #B9A6E0;       /* لون الخلفية البنفسجي */
    --circle-color: #9F87CC;   /* لون دايرة اللوجو */
    --text-dark: #1E2A3A;      /* لون العنوان */
    --text-gray: #8A93A0;      /* لون الوصف */
    --card-bg: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tahoma', 'Segoe UI', sans-serif;
    background: var(--card-bg);
    display: flex;
    justify-content: center;
  }

  .page {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
  }

  .header {
    background: var(--bg-color);
    height: 220px;
    position: relative;
  }

  .avatar-wrap {
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 160px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar {
    width: 135px;
    height: 135px;
    background: var(--circle-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    overflow: hidden;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .info {
    text-align: center;
    padding: 90px 24px 24px;
  }

  .name {
    font-size: 30px;
    font-weight: bold;
    color: var(--text-dark);
    margin-bottom: 8px;
  }

  .tagline {
    font-size: 17px;
    color: var(--text-gray);
    margin-bottom: 20px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: #eee;
    margin: 0 auto 30px;
  }

  .section-title {
    font-size: 22px;
    font-weight: bold;
    color: var(--text-dark);
    padding: 0 24px;
    margin-bottom: 12px;
  }

  .links {
    padding: 0 24px 40px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 16px;
    padding: 14px 16px;
    text-decoration: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }

  .link-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
    flex-shrink: 0;
  }

  .icon.facebook { background: #3b5998; }
  .icon.instagram { background: radial-gradient(circle at 30% 110%, #fdf497, #fd5949, #d6249f, #285AEB); }
  .icon.tiktok { background: #000; }

  .link-text .title { font-size: 17px; color: var(--text-dark); font-weight: 600; }
  .link-text .subtitle { font-size: 13px; color: var(--text-gray); }

  .arrow { color: #aaa; font-size: 18px; }
</style>
</head>
<body>

<div class="page">

  <div class="header"></div>

  <div class="avatar-wrap">
    <div class="avatar">
      <!-- ==================================================== -->
      <!-- 🖼️ لو عندك صورة لوجو، حطي رابطها هنا بدل النص:        -->
      <!-- <img src="رابط الصورة هنا" alt="لوجو">                -->
      <!-- ==================================================== -->
      اسمك
    </div>
  </div>

  <div class="info">
    <!-- ✏️ الاسم -->
    <div class="name">اسم صفحتك</div>
    <!-- ✏️ الوصف -->
    <div class="tagline">وصف بسيط هنا</div>
    <div class="divider"></div>
  </div>

  <div class="section-title">تقدروا تلاقوني على</div>

  <div class="links">

    <!-- ✏️ رابط الفيسبوك -->
    <a class="link-card" href="https://facebook.com/رابطك" target="_blank">
      <div class="link-left">
        <div class="icon facebook">f</div>
        <div class="link-text">
          <div class="title">Facebook</div>
          <div class="subtitle">اسم الحساب</div>
        </div>
      </div>
      <div class="arrow">&#8592;</div>
    </a>

    <!-- ✏️ رابط الانستجرام -->
    <a class="link-card" href="https://instagram.com/رابطك" target="_blank">
      <div class="link-left">
        <div class="icon instagram">📷</div>
        <div class="link-text">
          <div class="title">Instagram</div>
          <div class="subtitle">اسم الحساب</div>
        </div>
      </div>
      <div class="arrow">&#8592;</div>
    </a>

    <!-- ✏️ رابط التيك توك -->
    <a class="link-card" href="https://tiktok.com/@رابطك" target="_blank">
      <div class="link-left">
        <div class="icon tiktok">♪</div>
        <div class="link-text">
          <div class="title">TikTok</div>
          <div class="subtitle">اسم الحساب</div>
        </div>
      </div>
      <div class="arrow">&#8592;</div>
    </a>

    <!-- ==================================================== -->
    <!-- ➕ عايزة تضيفي لينك جديد؟ انسخي كارت كامل زي دول        -->
    <!-- وبدلي الرابط والاسم والأيقونة                          -->
    <!-- ==================================================== -->

  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bimgo</title>
<style>
  :root {
    --bg-color: #B9A6E0;
    --circle-color: #9F87CC;
    --text-dark: #1E2A3A;
    --text-gray: #8A93A0;
    --card-bg: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tahoma', 'Segoe UI', sans-serif;
    background: var(--card-bg);
    display: flex;
    justify-content: center;
  }

  /* ===================== شاشة الترحيب ===================== */
  #welcome {
    position: fixed;
    inset: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.6s ease;
  }

  #welcome img {
    width: 70%;
    max-width: 320px;
  }

  #welcome.hide {
    opacity: 0;
    pointer-events: none;
  }

  /* ===================== الصفحة الرئيسية ===================== */
  .page {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
  }

  .header {
    background: var(--bg-color);
    height: 220px;
    position: relative;
  }

  .avatar-wrap {
    position: absolute;
    bottom: -70px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 160px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar {
    width: 135px;
    height: 135px;
    background: var(--circle-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .avatar img { width: 80%; height: auto; }

  .info {
    text-align: center;
    padding: 90px 24px 24px;
  }

  .name {
    font-size: 30px;
    font-weight: bold;
    color: var(--text-dark);
    margin-bottom: 8px;
  }

  .tagline {
    font-size: 17px;
    color: var(--text-gray);
    margin-bottom: 20px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: #eee;
    margin: 0 auto 30px;
  }

  .section-title {
    font-size: 22px;
    font-weight: bold;
    color: var(--text-dark);
    padding: 0 24px;
    margin-bottom: 12px;
  }

  .links {
    padding: 0 24px 40px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 16px;
    padding: 14px 16px;
    text-decoration: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }

  .link-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
    flex-shrink: 0;
  }

  .icon.facebook { background: #3b5998; }
  .icon.instagram { background: radial-gradient(circle at 30% 110%, #fdf497, #fd5949, #d6249f, #285AEB); }
  .icon.tiktok { background: #000; }

  .link-text .title { font-size: 17px; color: var(--text-dark); font-weight: 600; }
  .link-text .subtitle { font-size: 13px; color: var(--text-gray); }

  .arrow { color: #aaa; font-size: 18px; }
</style>
</head>
<body>

<!-- ✏️ شاشة الترحيب: بتظهر أول ما حد يفتح الصفحة وبعدين تختفي لوحدها -->
<div id="welcome">
  <img src="welcome-logo.png" alt="Bimgo">
</div>

<div class="page">

  <div class="header"></div>

  <div class="avatar-wrap">
    <div class="avatar">
      <img src="logo.png" alt="Bimgo">
    </div>
  </div>

  <div class="info">
    <div class="name">Bimgo</div>
    <div class="tagline">coloring book</div>
    <div class="divider"></div>
  </div>

  <div class="section-title">تقدروا تلاقوني على</div>

  <div class="links">

    <a class="link-card" href="https://www.facebook.com/share/1U6dfmK5mq/?mibextid=wwXIfr" target="_blank">
      <div class="link-left">
        <div class="icon facebook">f</div>
        <div class="link-text">
          <div class="title">Facebook</div>
          <div class="subtitle">Bimgo</div>
        </div>
      </div>
      <div class="arrow">&#8592;</div>
    </a>

    <a class="link-card" href="https://www.instagram.com/bimggoo?igsh=MXdjYWM3enBldjZ2NQ==" target="_blank">
      <div class="link-left">
        <div class="icon instagram">📷</div>
        <div class="link-text">
          <div class="title">Instagram</div>
          <div class="subtitle">bimggoo</div>
        </div>
      </div>
      <div class="arrow">&#8592;</div>
    </a>

    <a class="link-card" href="https://www.tiktok.com/@tiiilla1?_r=1&_t=ZS-97mV9HFkgsu" target="_blank">
      <div class="link-left">
        <div class="icon tiktok">♪</div>
        <div class="link-text">
          <div class="title">TikTok</div>
          <div class="subtitle">tiiilla1</div>
        </div>
      </div>
      <div class="arrow">&#8592;</div>
    </a>

  </div>

</div>

<script>
  // شاشة الترحيب بتفضل ثانية ونص وبعدين تختفي بهدوء
  setTimeout(function () {
    document.getElementById('welcome').classList.add('hide');
  }, 1500);
</script>

</body>
</html>
